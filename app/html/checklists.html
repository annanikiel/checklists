<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Checklists</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
  <a href="../index.html">← Back</a>
  <h1>Checklists</h1>
  <p class="hint">Select a checklist to run interactively.</p>

  <div id="list"></div>
  <script>
    const META = {
      preflight:     { title: 'Preflight',      sub: 'External pre-flight checks' },
      internal:      { title: 'Internal',        sub: 'Pre-flight cockpit checks' },
      start:         { title: 'Start',           sub: 'Engine start' },
      power_checks:  { title: 'Power checks',    sub: 'Run-up checks' },
      pre_takeoff:   { title: 'Pre-takeoff',     sub: 'Before departure' },
      after_landing: { title: 'After landing',   sub: 'Clear runway and tidy up' },
      fuelling:      { title: 'Fuelling',        sub: 'Engine shutdown for refuelling' },
      shutdown:      { title: 'Shutdown',        sub: 'Secure aircraft' },
    };
    const SEQUENCES = {
      c150: ['internal','start','power_checks','pre_takeoff','after_landing','fuelling','shutdown'],
      pa28: ['preflight','internal','start','power_checks','pre_takeoff','after_landing','fuelling','shutdown'],
    };
    const aircraft = localStorage.getItem('current_aircraft') || 'c150';
    const seq = SEQUENCES[aircraft] || SEQUENCES.c150;
    const list = document.getElementById('list');
    seq.forEach(key => {
      const m = META[key];
      const a = document.createElement('a');
      a.className = 'card';
      a.href = `checklist.html?name=${key}`;
      a.innerHTML = `<strong>${m.title}</strong><br/><small>${m.sub}</small>`;
      list.appendChild(a);
    });
  </script>
</body>
</html>
